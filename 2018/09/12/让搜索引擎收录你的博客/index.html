  </div>
   <div class="post-meta">

  </div>
  <div class="post-content">
    <p>如果你发现在google搜索不到你自己的博客，你可以自行向google提交(<a href="https://www.google.com/webmasters/tools/home?hl=zh-CN" target="_blank" rel="noopener">提交地址</a>)。<br>提交网站需要验证自己的所有权，我用的是推荐方法，即给自己的站点上传一个用于验证的网站，上传成功即通过验证。打开地址是www.你的站点网址/验证文件.html。对于hexo用户，直接粘贴到public就行。<br>然后hexo g，hexo d部署。再到提交处点验证即可。</p>
